name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Bevy deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libasound2-dev libudev-dev libxkbcommon-x11-dev libwayland-dev libxkbcommon-dev
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Test core crates
        run: cargo test -p grok-bevy-env -p grok-bevy-brp -p grok-bevy --all-targets
      - name: Build CLI
        run: cargo build -p grok-bevy
      - name: Doctor (no compile probe)
        run: cargo run -p grok-bevy -- doctor

  sample-check:
    name: sample-app check (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Bevy deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libasound2-dev libudev-dev libxkbcommon-x11-dev libwayland-dev libxkbcommon-dev
      - uses: Swatinem/rust-cache@v2
      - name: cargo check sample with remote+capture
        run: cargo check -p grok_bevy_sample --features remote,capture
      - name: cargo check headless BRP binary
        run: cargo check -p grok_bevy_sample --bin brp_headless --features remote

  demo-check:
    name: dogfood demos check (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Bevy deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libasound2-dev libudev-dev libxkbcommon-x11-dev libwayland-dev libxkbcommon-dev
      - uses: Swatinem/rust-cache@v2
      - name: cargo check demo_2d + demo_3d (remote,capture)
        run: |
          cargo check -p demo_2d --features remote,capture
          cargo check -p demo_3d --features remote,capture
